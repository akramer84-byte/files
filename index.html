<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fraction Blast Academy 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --hot-pink:#FF2D78;--neon-mint:#00F5A0;--lavender:#C084FC;
  --sky:#38BDF8;--gold:#FFD700;--coral:#FF6B6B;
  --dark:#0F0A1E;--card-bg:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.15);
  --nav-height:70px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--dark);font-family:'Nunito',sans-serif;color:white;display:flex;flex-direction:column;}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%,rgba(255,45,120,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 80%,rgba(192,132,252,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 60% 10%,rgba(0,245,160,0.10) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
#scrollArea{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;z-index:1;padding-bottom:20px;}
#bottomNav{position:relative;z-index:300;display:flex;background:rgba(15,10,30,0.97);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border:none;background:transparent;color:rgba(255,255,255,0.45);font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;cursor:pointer;transition:color 0.2s;gap:4px;}
.nav-btn .nav-icon{font-size:22px;line-height:1;}
.nav-btn.active{color:var(--hot-pink);}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 6px rgba(255,45,120,0.7));}
.section{display:none;padding:16px;}
.section.active{display:block;}
.app-header{text-align:center;padding:20px 16px 10px;}
.logo-badge{display:inline-block;background:linear-gradient(135deg,var(--hot-pink),var(--lavender));border-radius:50px;padding:5px 16px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,8vw,3rem);font-weight:900;line-height:1.1;background:linear-gradient(135deg,#FF2D78,#C084FC,#00F5A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.subtitle{color:rgba(255,255,255,0.55);font-size:13px;font-weight:600;}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.sec-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;}
.sec-badge{background:var(--card-bg);border:1px solid var(--border);border-radius:50px;padding:3px 12px;font-size:11px;font-weight:800;color:rgba(255,255,255,0.55);}
.cheat-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:500px){.cheat-grid{grid-template-columns:1fr 1fr;}}
@media(min-width:800px){.cheat-grid{grid-template-columns:1fr 1fr 1fr;}}
.fraction-card{background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:18px 16px;position:relative;overflow:hidden;}
.fraction-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;}
.card-whole::before{background:linear-gradient(90deg,#FFD700,#FF8C00);}
.card-half::before{background:linear-gradient(90deg,#FF2D78,#FF6BAE);}
.card-third::before{background:linear-gradient(90deg,#C084FC,#7C3AED);}
.card-quarter::before{background:linear-gradient(90deg,#38BDF8,#0284C7);}
.card-eighth::before{background:linear-gradient(90deg,#00F5A0,#059669);}
.card-icon{font-size:24px;margin-bottom:8px;}
.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:12px;}
.triple-display{display:flex;gap:6px;}
.triple-box{flex:1;background:rgba(0,0,0,0.25);border-radius:10px;padding:8px 4px;text-align:center;}
.triple-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:0.55;margin-bottom:3px;}
.triple-value{font-size:0.95rem;font-weight:900;}
.fraction-val{font-size:1.1rem;}
.visual-bar{margin-top:12px;height:8px;background:rgba(0,0,0,0.3);border-radius:20px;overflow:hidden;}
.visual-fill{height:100%;border-radius:20px;}
.fc-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;}
.progress-track{width:100%;background:rgba(255,255,255,0.1);border-radius:20px;height:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--hot-pink),var(--lavender));transition:width 0.5s;}
.progress-label{text-align:center;font-size:12px;font-weight:700;color:rgba(255,255,255,0.45);margin-top:5px;}
.fc-scene{width:100%;max-width:460px;height:300px;cursor:pointer;perspective:1000px;}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(.25,.46,.45,.94);}
.fc-scene.flipped .fc-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;text-align:center;border:1px solid var(--border);}
.card-front{background:linear-gradient(135deg,rgba(255,45,120,0.15),rgba(192,132,252,0.15));}
.card-back{background:linear-gradient(135deg,rgba(0,245,160,0.12),rgba(56,189,248,0.12));transform:rotateY(180deg);}
.fc-q-label{font-size:10px;font-weight:800;color:rgba(255,255,255,0.45);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.fc-main{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;color:white;line-height:1;}
.fc-hint{color:rgba(255,255,255,0.3);font-size:12px;font-weight:700;margin-top:14px;}
.fc-cat{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:50px;background:var(--card-bg);border:1px solid var(--border);}
.answer-row{display:flex;gap:10px;margin-top:10px;}
.answer-pill{background:rgba(0,0,0,0.3);border-radius:10px;padding:10px 14px;text-align:center;min-width:70px;}
.answer-pill .alabel{font-size:9px;font-weight:800;opacity:0.5;letter-spacing:1px;text-transform:uppercase;}
.answer-pill .aval{font-size:1.2rem;font-weight:900;margin-top:3px;}
.memory-tip{margin-top:10px;padding:8px 12px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);border-radius:10px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.8);line-height:1.5;}
.fc-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn{padding:11px 22px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--hot-pink),var(--lavender));color:white;box-shadow:0 4px 16px rgba(255,45,120,0.35);}
.btn-secondary{background:var(--card-bg);border:2px solid var(--border);color:rgba(255,255,255,0.8);}
.btn:active{transform:scale(0.96);}
.quiz-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.score-badge{background:linear-gradient(135deg,var(--neon-mint),var(--sky));color:var(--dark);font-weight:900;font-size:13px;padding:7px 16px;border-radius:50px;}
.streak-badge{background:linear-gradient(135deg,var(--gold),var(--coral));color:var(--dark);font-weight:900;font-size:13px;padding:7px 16px;border-radius:50px;}
.quiz-qcard{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:22px 18px;text-align:center;margin-bottom:14px;}
.quiz-ctx{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:10px;}
.quiz-q{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,5vw,1.8rem);font-weight:700;line-height:1.3;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.opt-btn{padding:14px 10px;border-radius:14px;border:2px solid var(--border);background:var(--card-bg);color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.2s;}
.opt-btn:active:not(:disabled){transform:scale(0.97);}
.opt-btn.correct{background:linear-gradient(135deg,rgba(0,245,160,0.3),rgba(0,245,160,0.1));border-color:var(--neon-mint);}
.opt-btn.wrong{background:linear-gradient(135deg,rgba(255,45,120,0.2),rgba(255,45,120,0.05));border-color:var(--hot-pink);}
.feedback{text-align:center;font-size:1rem;font-weight:800;min-height:24px;margin-bottom:8px;}
.feedback.correct{color:var(--neon-mint);}
.feedback.wrong{color:var(--coral);}
.quiz-emoji{font-size:2rem;display:block;margin-bottom:4px;animation:pop 0.4s ease;}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.3);}100%{transform:scale(1);}}
.memory-tip-quiz{margin-top:10px;padding:9px 14px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);border-radius:10px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.85);line-height:1.5;text-align:center;}
.quiz-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.q-counter{color:rgba(255,255,255,0.35);font-size:12px;font-weight:700;}
.results-card{text-align:center;padding:36px 24px;background:var(--card-bg);border:1px solid var(--border);border-radius:22px;}
.big-score{font-family:'Playfair Display',serif;font-size:4.5rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin:8px 0;}
.grade-emoji{font-size:3.5rem;display:block;margin-bottom:8px;}
.result-msg{font-size:1.1rem;font-weight:700;color:rgba(255,255,255,0.8);margin:6px 0 20px;}

/* BALL SHOOTER GAME */
#gameCanvas{display:none;position:fixed;top:0;left:0;width:100%;height:calc(100% - var(--nav-height,70px));z-index:200;touch-action:none;background:#0F0A1E;}
#gameCanvas.active{display:block;}
#gameOverScreen{display:none;position:fixed;top:0;left:0;right:0;bottom:var(--nav-height,70px);background:rgba(15,10,30,0.95);z-index:210;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center;}
#gameOverScreen.show{display:flex;}
.confetti-p{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:9999;animation:cfFall 2s ease-in forwards;}
@keyframes cfFall{0%{opacity:1;transform:translateY(-10px) rotate(0);}100%{opacity:0;transform:translateY(80vh) rotate(720deg);}}
</style>
</head>
<body>

<div id="scrollArea">
  <div class="app-header">
    <div class="logo-badge">🚀 Level Up Your Math 🚀</div>
    <h1>Fraction Blast<br>Academy</h1>
    <p class="subtitle">Master fractions, decimals & percentages — ace that test! 🎯</p>
  </div>

  <!-- CHEAT SHEET -->
  <div class="section active" id="sec-cheatsheet">
    <div class="sec-head"><span class="sec-title">The Essentials 🧠</span><span class="sec-badge">10 must-knows</span></div>
    <div class="cheat-grid" id="cheatGrid"></div>
  </div>

  <!-- FLASHCARDS -->
  <div class="section" id="sec-flashcards">
    <div class="sec-head"><span class="sec-title">Flash Cards 🃏</span><span class="sec-badge">Tap to flip!</span></div>
    <div class="fc-wrap">
      <div style="width:100%;max-width:460px;">
        <div class="progress-track"><div class="progress-fill" id="fcProg" style="width:0%"></div></div>
        <div class="progress-label" id="fcLabel">Card 1 of 40</div>
      </div>
      <div class="fc-scene" id="fcScene" onclick="flipCard()">
        <div class="fc-inner">
          <div class="card-face card-front" id="cfFront"></div>
          <div class="card-face card-back" id="cfBack"></div>
        </div>
      </div>
      <div class="fc-controls">
        <button class="btn btn-secondary" onclick="prevCard()">← Back</button>
        <button class="btn btn-primary" onclick="nextCard()">Next →</button>
        <button class="btn btn-secondary" onclick="shuffleCards()">🔀 Shuffle</button>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="section" id="sec-quiz">
    <div class="quiz-topbar">
      <span class="sec-title">Quiz Me! 🏁</span>
      <div style="display:flex;gap:8px;">
        <span class="score-badge" id="scoreDisp">Score: 0</span>
        <span class="streak-badge" id="streakDisp">🔥 0</span>
      </div>
    </div>
    <div id="quizContainer"></div>
  </div>
</div>

<!-- BALL SHOOTER — fullscreen fixed canvas -->
<canvas id="gameCanvas"></canvas>
<div id="gameOverScreen">
  <div style="font-size:3rem;" id="goEmoji">🏆</div>
  <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;" id="goTitle">Game Over!</div>
  <div style="font-size:1rem;font-weight:700;color:rgba(255,255,255,0.7);" id="goMsg">Nice run!</div>
  <div style="font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;" id="goScore">0</div>
  <button class="btn btn-primary" onclick="startGame()">🔄 Play Again</button>
</div>

<!-- BOTTOM NAV -->
<div id="bottomNav">
  <button class="nav-btn active" onclick="switchTab('cheatsheet',this)">
    <span class="nav-icon">📋</span>Cheat Sheet
  </button>
  <button class="nav-btn" onclick="switchTab('flashcards',this)">
    <span class="nav-icon">🃏</span>Flash Cards
  </button>
  <button class="nav-btn" onclick="switchTab('quiz',this)">
    <span class="nav-icon">🏁</span>Quiz Me!
  </button>
  <button class="nav-btn" onclick="switchTab('game',this)">
    <span class="nav-icon">🎯</span>Ball Blast
  </button>
</div>

<script>
// ═══════════════════════════════
// DATA
// ═══════════════════════════════
const fractions=[
  {id:'whole',label:'One Whole',fraction:'1',decimal:'1.0',percent:'100%',icon:'🏆',fill:100,colorA:'#FFD700',colorB:'#FF8C00',theme:'card-whole',tip:'Easy one! 1 whole = the ENTIRE thing. 100% means ALL of it. Think: scored 100% on a test = perfect!'},
  {id:'half',label:'One Half',fraction:'1/2',decimal:'0.5',percent:'50%',icon:'⚽',fill:50,colorA:'#FF2D78',colorB:'#FF6BAE',theme:'card-half',tip:'Half always ends in .5 — think 50 cents = half a dollar. Split anything in 2 equal parts = one half!'},
  {id:'third',label:'One Third',fraction:'1/3',decimal:'0.333...',percent:'33.3%',icon:'🌮',fill:33.3,colorA:'#C084FC',colorB:'#7C3AED',theme:'card-third',tip:'The 3s repeat FOREVER! 0.333... = 33.3% — thirds are the ONLY ones with a repeating decimal. Wild, right?!'},
  {id:'twothirds',label:'Two Thirds',fraction:'2/3',decimal:'0.666...',percent:'66.7%',icon:'🎸',fill:66.7,colorA:'#C084FC',colorB:'#7C3AED',theme:'card-third',tip:'The 6s repeat! 0.666... = 66.7% — it is double the third (0.333 x 2). Almost 3/4 but not quite!'},
  {id:'quarter',label:'One Quarter',fraction:'1/4',decimal:'0.25',percent:'25%',icon:'💎',fill:25,colorA:'#38BDF8',colorB:'#0284C7',theme:'card-quarter',tip:'A quarter coin = 25 cents = $0.25 = 25%! You already knew this one. Money = fractions!'},
  {id:'twoquarters',label:'Two Quarters',fraction:'2/4',decimal:'0.5',percent:'50%',icon:'🪙',fill:50,colorA:'#38BDF8',colorB:'#0284C7',theme:'card-quarter',tip:'2 quarters = 50 cents = same as 1/2! Whenever you see 2/4, just think of it as 1/2 wearing a costume.'},
  {id:'threequarters',label:'Three Quarters',fraction:'3/4',decimal:'0.75',percent:'75%',icon:'🏎️',fill:75,colorA:'#38BDF8',colorB:'#0284C7',theme:'card-quarter',tip:'Three quarters = 75 cents = $0.75 = 75%! Think: 3/4 charged phone = 75% battery. Almost full!'}
];

// ═══════════════════════════════
// CHEAT SHEET
// ═══════════════════════════════
function buildCheatSheet(){
  const g=document.getElementById('cheatGrid');
  fractions.forEach(f=>{
    const d=document.createElement('div');
    d.className='fraction-card '+f.theme;
    d.innerHTML=`<div class="card-icon">${f.icon}</div>
      <div class="card-title">${f.label}</div>
      <div class="triple-display">
        <div class="triple-box"><div class="triple-label">Fraction</div><div class="triple-value fraction-val">${f.fraction}</div></div>
        <div class="triple-box"><div class="triple-label">Decimal</div><div class="triple-value">${f.decimal}</div></div>
        <div class="triple-box"><div class="triple-label">Percent</div><div class="triple-value">${f.percent}</div></div>
      </div>
      <div class="visual-bar"><div class="visual-fill" style="width:${f.fill}%;background:linear-gradient(90deg,${f.colorA},${f.colorB})"></div></div>`;
    g.appendChild(d);
  });
}

// ═══════════════════════════════
// FLASHCARDS
// ═══════════════════════════════
let fcDeck=[],fcIdx=0,fcFlipped=false;
function buildDeck(){
  fcDeck=[];
  fractions.forEach(f=>{
    fcDeck.push({q:`Decimal for <b style="color:#FF2D78">${f.fraction}</b>?`,a:f.decimal,extra:f.percent,extraLbl:'Percent',cat:f.label,icon:f.icon,tip:f.tip});
    fcDeck.push({q:`Percentage for <b style="color:#C084FC">${f.fraction}</b>?`,a:f.percent,extra:f.decimal,extraLbl:'Decimal',cat:f.label,icon:f.icon,tip:f.tip});
    fcDeck.push({q:`Fraction equal to <b style="color:#38BDF8">${f.percent}</b>?`,a:f.fraction,extra:f.decimal,extraLbl:'Decimal',cat:f.label,icon:f.icon,tip:f.tip});
    fcDeck.push({q:`Fraction equal to <b style="color:#00F5A0">${f.decimal}</b>?`,a:f.fraction,extra:f.percent,extraLbl:'Percent',cat:f.label,icon:f.icon,tip:f.tip});
  });
  fcDeck=fcDeck.sort(()=>Math.random()-0.5);
}
function renderFC(){
  const c=fcDeck[fcIdx];
  document.getElementById('fcScene').classList.remove('flipped');
  fcFlipped=false;
  document.getElementById('cfFront').innerHTML=`
    <span class="fc-cat">${c.icon} ${c.cat}</span>
    <div style="margin-top:16px;font-size:1.15rem;font-weight:700;line-height:1.5;">${c.q}</div>
    <div class="fc-hint" style="margin-top:16px;">👆 Tap to flip!</div>`;
  document.getElementById('cfBack').innerHTML=`
    <span class="fc-cat">${c.icon} ${c.cat}</span>
    <div class="fc-q-label" style="margin-top:12px;">Answer</div>
    <div class="fc-main">${c.a}</div>
    <div class="answer-row"><div class="answer-pill"><div class="alabel">${c.extraLbl}</div><div class="aval">${c.extra}</div></div></div>
    <div class="memory-tip">💡 ${c.tip}</div>`;
  const pct=fcDeck.length>1?(fcIdx/(fcDeck.length-1)*100):100;
  document.getElementById('fcProg').style.width=pct+'%';
  document.getElementById('fcLabel').textContent='Card '+(fcIdx+1)+' of '+fcDeck.length;
}
function flipCard(){fcFlipped=!fcFlipped;document.getElementById('fcScene').classList.toggle('flipped',fcFlipped);}
function nextCard(){fcIdx=(fcIdx+1)%fcDeck.length;renderFC();}
function prevCard(){fcIdx=(fcIdx-1+fcDeck.length)%fcDeck.length;renderFC();}
function shuffleCards(){fcDeck=fcDeck.sort(()=>Math.random()-0.5);fcIdx=0;renderFC();}

// ═══════════════════════════════
// QUIZ (20 questions)
// ═══════════════════════════════
let score=0,streak=0,qIdx=0,quizDeck=[],answered=false;
const ctxs=[
  {e:'🏎️',t:'A Ferrari costs $300k. You saved'},
  {e:'⚽',t:'You played'},
  {e:'🎮',t:'The game is'},
  {e:'🍕',t:'The pizza is'},
  {e:'🚀',t:'The rocket is'},
  {e:'🏀',t:'The game time is'},
  {e:'🎵',t:'The playlist is'},
  {e:'🌮',t:'The tacos are'},
];
function buildQuiz(){
  let pool=[];
  const sh=a=>[...a].sort(()=>Math.random()-0.5);
  // Exclude 2/4 from quiz entirely — same value as 1/2 causes ambiguous answers
  const quizFractions=fractions.filter(f=>f.id!=='twoquarters');
  quizFractions.forEach(f=>{
    // For wrong answers, exclude any fraction with the same decimal value as correct answer
    const o=quizFractions.filter(x=>x.id!==f.id && x.decimal!==f.decimal);
    pool.push({q:`${f.fraction} as a decimal is...`,a:f.decimal,wrong:sh(o.map(x=>x.decimal)).slice(0,3),tip:f.tip});
    pool.push({q:`${f.fraction} as a percentage is...`,a:f.percent,wrong:sh(o.map(x=>x.percent)).slice(0,3),tip:f.tip});
    pool.push({q:`${f.percent} as a fraction is...`,a:f.fraction,wrong:sh(o.map(x=>x.fraction)).slice(0,3),tip:f.tip});
    pool.push({q:`${f.decimal} as a fraction is...`,a:f.fraction,wrong:sh(o.map(x=>x.fraction)).slice(0,3),tip:f.tip});
  });
  quizDeck=sh(pool).slice(0,20);
}
function renderQuiz(){
  if(qIdx>=quizDeck.length){showResults();return;}
  answered=false;
  const q=quizDeck[qIdx];
  const ctx=ctxs[Math.floor(Math.random()*ctxs.length)];
  const opts=[q.a,...q.wrong.slice(0,3)].sort(()=>Math.random()-0.5);
  const sa=q.a.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  document.getElementById('quizContainer').innerHTML=`
    <div class="quiz-qcard">
      <div class="quiz-ctx">${ctx.e} ${ctx.t} ${q.q.split(' ')[0]} of the way</div>
      <div class="quiz-q">${q.q}</div>
    </div>
    <div class="quiz-options">
      ${opts.map(o=>`<button class="opt-btn" onclick="selectAns(this,'${o.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}','${sa}')">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <div class="quiz-footer">
      <span class="q-counter">Q${qIdx+1} of 20</span>
      <button class="btn btn-secondary" id="nxtBtn" onclick="nextQ()" style="display:none;">Next ➜</button>
    </div>`;
}
const okMsgs=['Let\'s go! 🚀','On fire! 🔥','Nailed it! 💎','Boom! 🎉','Lambo level! 🏎️','Too easy! 😎','Crushed it! 💥'];
const noMsgs=['Almost! 💪','Check the cheat sheet! 📋','You got this! 🌟','So close! 🤏'];
function selectAns(btn,sel,correct){
  if(answered)return;
  answered=true;
  const q=quizDeck[qIdx];
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  if(sel===correct){
    btn.classList.add('correct');score++;streak++;
    fb.innerHTML=`<span class="quiz-emoji">🎉</span>${okMsgs[Math.floor(Math.random()*okMsgs.length)]}<div class="memory-tip-quiz">💡 ${q.tip}</div>`;
    fb.className='feedback correct';
    if(score%5===0&&score>0)confetti();
  } else {
    btn.classList.add('wrong');streak=0;
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
    fb.innerHTML=`<span class="quiz-emoji">💡</span>${noMsgs[Math.floor(Math.random()*noMsgs.length)]} Answer: <b>${correct}</b><div class="memory-tip-quiz">💡 ${q.tip}</div>`;
    fb.className='feedback wrong';
  }
  document.getElementById('scoreDisp').textContent='Score: '+score;
  document.getElementById('streakDisp').textContent='🔥 '+streak;
  document.getElementById('nxtBtn').style.display='block';
}
function nextQ(){qIdx++;renderQuiz();}
function showResults(){
  const pct=Math.round(score/20*100);
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='Perfect score! Test? No problem! 🏆';}
  else if(pct>=75){emoji='💎';msg='Great work! Just a little more practice and you are set!';}
  else if(pct>=60){emoji='✨';msg='Great effort! Review the cheat sheet and crush it!';}
  else{emoji='💪';msg='You got this! Study the cheat sheet and try again!';}
  document.getElementById('quizContainer').innerHTML=`
    <div class="results-card">
      <span class="grade-emoji">${emoji}</span>
      <div class="sec-title">Quiz Complete!</div>
      <div class="big-score">${pct}%</div>
      <div class="result-msg">${msg}<br><span style="opacity:0.5;font-size:0.85rem;">${score} of 20 correct</span></div>
      <button class="btn btn-primary" onclick="restartQuiz()">🔄 Try Again</button>
    </div>`;
  if(pct>=90)confetti();
}
function restartQuiz(){
  score=0;streak=0;qIdx=0;
  document.getElementById('scoreDisp').textContent='Score: 0';
  document.getElementById('streakDisp').textContent='🔥 0';
  buildQuiz();renderQuiz();
}

// ═══════════════════════════════
// BALL SHOOTER GAME 🎯
// ═══════════════════════════════
const canvas=document.getElementById('gameCanvas');
const ctx2=canvas.getContext('2d');
let gScore=0,gLives=3,gActive=false,gAnimId=null;
let balls=[],bullet=null,shooter={x:0,y:0};
let currentQ=null,gMsgTimer=0,gMsgText='',gMsgGood=true;
let touchAimX=null;

const BALL_COLORS=['#FF2D78','#C084FC','#38BDF8','#00F5A0','#FFD700','#FF6B6B','#7C3AED','#0284C7'];
const BALL_R=36;
const BULLET_R=10;
const BULLET_SPEED=10;
const BALL_SPEED_BASE=0.7;

function resizeCanvas(){
  const nav=document.getElementById('bottomNav');
  const navH=nav?nav.offsetHeight:70;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight-navH;
  shooter.x=canvas.width/2;
  shooter.y=canvas.height-55;
}

function makeQuestion(){
  const f=fractions[Math.floor(Math.random()*fractions.length)];
  const type=Math.floor(Math.random()*3);
  let qText,correct;
  if(type===0){qText=`${f.fraction} as a decimal?`;correct=f.decimal;}
  else if(type===1){qText=`${f.fraction} as a percent?`;correct=f.percent;}
  else{qText=`${f.percent} as a fraction?`;correct=f.fraction;}
  // Wrong answers — pick from other fractions
  const others=fractions.filter(x=>x.id!==f.id);
  const sh=a=>[...a].sort(()=>Math.random()-0.5);
  let wrongs;
  if(type===0) wrongs=sh(others.map(x=>x.decimal)).slice(0,3);
  else if(type===1) wrongs=sh(others.map(x=>x.percent)).slice(0,3);
  else wrongs=sh(others.map(x=>x.fraction)).slice(0,3);
  const answers=sh([correct,...wrongs.slice(0,3)]);
  return{qText,correct,answers,tip:f.tip};
}

function spawnBalls(){
  if(!currentQ)return;
  balls=[];
  const W=canvas.width;
  const count=currentQ.answers.length;
  const spacing=W/(count+1);
  const cols=[...BALL_COLORS].sort(()=>Math.random()-0.5);
  currentQ.answers.forEach((ans,i)=>{
    const x=spacing*(i+1);
    const y=BALL_R+20+Math.random()*60;
    const vx=(Math.random()-0.5)*BALL_SPEED_BASE*2;
    const vy=BALL_SPEED_BASE*(0.5+Math.random()*0.5);
    balls.push({x,y,vx,vy,r:BALL_R,color:cols[i%cols.length],label:ans,popped:false,popAnim:0});
  });
}

function startGame(){
  gScore=0;gLives=3;gActive=true;bullet=null;touchAimX=null;
  document.getElementById('gameOverScreen').classList.remove('show');
  canvas.classList.add('active');
  currentQ=makeQuestion();
  resizeCanvas();
  spawnBalls();
  if(gAnimId)cancelAnimationFrame(gAnimId);
  gameLoop();
}

function updateGameUI(){}

// Smooth aim angle — lerped
let aimAngle = -Math.PI/2; // straight up
let targetAngle = -Math.PI/2;
let isDragging = false;
let splats = []; // paintball splat particles

function getAimAngle(touchX){
  // angle from shooter toward touch point
  return Math.atan2(90 - shooter.y, touchX - shooter.x);
}

function fireBullet(){
  if(bullet||!gActive)return;
  const vx = Math.cos(aimAngle) * BULLET_SPEED;
  const vy = Math.sin(aimAngle) * BULLET_SPEED;
  bullet={x:shooter.x, y:shooter.y, vx, vy, r:BULLET_R, trail:[]};
}

function spawnSplat(x, y, color, correct){
  const count = correct ? 22 : 14;
  const drops = [];
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = correct ? (2+Math.random()*6) : (1+Math.random()*4);
    const size = correct ? (4+Math.random()*10) : (3+Math.random()*7);
    drops.push({
      x,y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - (correct?2:1),
      r: size,
      alpha: 1,
      color,
      gravity: 0.18,
      squish: 0.3+Math.random()*0.7
    });
  }
  // big central blob
  drops.push({x,y,vx:0,vy:0,r:correct?28:18,alpha:0.85,color,gravity:0,squish:1,isCentral:true});
  splats.push({drops, life:1.0, correct});
}

function gameLoop(){
  gAnimId=requestAnimationFrame(gameLoop);
  ctx2.clearRect(0,0,canvas.width,canvas.height);

  // Background
  ctx2.fillStyle='#0F0A1E';
  ctx2.fillRect(0,0,canvas.width,canvas.height);

  // Background glow
  const grd=ctx2.createRadialGradient(canvas.width*0.2,canvas.height*0.2,50,canvas.width*0.2,canvas.height*0.2,canvas.width*0.6);
  grd.addColorStop(0,'rgba(255,45,120,0.06)');grd.addColorStop(1,'transparent');
  ctx2.fillStyle=grd;ctx2.fillRect(0,0,canvas.width,canvas.height);

  // Smooth aim lerp
  let da = targetAngle - aimAngle;
  // wrap angle
  while(da>Math.PI)da-=Math.PI*2;
  while(da<-Math.PI)da+=Math.PI*2;
  aimAngle += da * 0.18;

  // Clamp aim to not go below shooter
  aimAngle = Math.max(-Math.PI, Math.min(-0.05, aimAngle));

  // HUD - question box at top
  if(currentQ){
    const boxH=60,pad=14,W=canvas.width;
    ctx2.fillStyle='rgba(255,255,255,0.07)';
    ctx2.beginPath();
    ctx2.roundRect(pad,8,W-pad*2,boxH,12);
    ctx2.fill();
    ctx2.strokeStyle='rgba(255,255,255,0.1)';
    ctx2.lineWidth=1;ctx2.stroke();
    ctx2.fillStyle='rgba(255,255,255,0.38)';
    ctx2.font='700 9px Nunito,sans-serif';
    ctx2.textAlign='center';ctx2.textBaseline='top';
    ctx2.fillText('🎯 BLAST THE CORRECT ANSWER',W/2,14);
    ctx2.fillStyle='white';
    ctx2.font='bold 17px Nunito,sans-serif';
    ctx2.textBaseline='middle';
    ctx2.fillText(currentQ.qText,W/2,8+boxH/2+7);
  }

  // HUD bottom bar
  {
    const W=canvas.width,H=canvas.height;
    ctx2.fillStyle='rgba(0,0,0,0.4)';
    ctx2.beginPath();ctx2.roundRect(12,H-52,W-24,40,10);ctx2.fill();
    ctx2.fillStyle='white';ctx2.font='700 15px Nunito,sans-serif';
    ctx2.textAlign='left';ctx2.textBaseline='middle';
    ctx2.fillText('❤️'.repeat(gLives)+'🖤'.repeat(Math.max(0,3-gLives)),24,H-32);
    ctx2.textAlign='right';ctx2.fillStyle='#00F5A0';
    ctx2.fillText('Score: '+gScore,W-24,H-32);
  }

  // Draw trajectory dots (predicted path)
  if(gActive && !bullet){
    const sx=shooter.x, sy=shooter.y;
    const vx=Math.cos(aimAngle)*BULLET_SPEED;
    const vy=Math.sin(aimAngle)*BULLET_SPEED;
    ctx2.save();
    for(let t=0;t<60;t++){
      const px=sx+vx*t;
      const py=sy+vy*t;
      if(py<0||px<0||px>canvas.width)break;
      const alpha=0.55*(1-t/60);
      const r=4*(1-t/60)+2;
      ctx2.beginPath();
      ctx2.arc(px,py,r,0,Math.PI*2);
      ctx2.fillStyle=`rgba(255,210,50,${alpha})`;
      ctx2.fill();
    }
    ctx2.restore();
  }

  // Draw paintball splats
  splats=splats.filter(s=>s.life>0);
  splats.forEach(s=>{
    s.life-=0.025;
    s.drops.forEach(d=>{
      if(d.isCentral){
        ctx2.save();
        ctx2.globalAlpha=d.alpha*s.life;
        ctx2.beginPath();ctx2.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx2.fillStyle=d.color;ctx2.fill();
        ctx2.restore();
        return;
      }
      d.x+=d.vx; d.y+=d.vy; d.vy+=d.gravity;
      d.alpha=s.life;
      ctx2.save();
      ctx2.globalAlpha=d.alpha;
      ctx2.beginPath();
      // squished splat drop
      ctx2.ellipse(d.x,d.y,d.r*d.squish,d.r,0,0,Math.PI*2);
      ctx2.fillStyle=d.color;ctx2.fill();
      ctx2.restore();
    });
  });

  // Move & draw balls
  balls.forEach(b=>{
    if(b.popped) return; // splat handles visual
    b.x+=b.vx;b.y+=b.vy;
    if(b.x-b.r<0){b.vx=Math.abs(b.vx);b.x=b.r;}
    if(b.x+b.r>canvas.width){b.vx=-Math.abs(b.vx);b.x=canvas.width-b.r;}
    if(b.y-b.r<90){b.vy=Math.abs(b.vy);b.y=90+b.r;}
    if(b.y+b.r>canvas.height-70){b.vy=-Math.abs(b.vy);b.y=canvas.height-70-b.r;}

    // Glow ring
    ctx2.beginPath();ctx2.arc(b.x,b.y,b.r+4,0,Math.PI*2);
    ctx2.fillStyle=b.color+'22';ctx2.fill();

    // Ball gradient
    const grad=ctx2.createRadialGradient(b.x-b.r*0.35,b.y-b.r*0.35,b.r*0.05,b.x,b.y,b.r);
    grad.addColorStop(0,'rgba(255,255,255,0.35)');
    grad.addColorStop(0.5,b.color);
    grad.addColorStop(1,b.color+'bb');
    ctx2.beginPath();ctx2.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx2.fillStyle=grad;ctx2.fill();
    ctx2.strokeStyle='rgba(255,255,255,0.25)';ctx2.lineWidth=2;ctx2.stroke();

    // Shine spot
    ctx2.beginPath();ctx2.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.22,0,Math.PI*2);
    ctx2.fillStyle='rgba(255,255,255,0.45)';ctx2.fill();

    // Label
    ctx2.fillStyle='white';
    ctx2.font='bold 14px Nunito,sans-serif';
    ctx2.textAlign='center';ctx2.textBaseline='middle';
    // shadow
    ctx2.shadowColor='rgba(0,0,0,0.8)';ctx2.shadowBlur=4;
    ctx2.fillText(b.label,b.x,b.y);
    ctx2.shadowBlur=0;
  });

  // Move & draw bullet with trail
  if(bullet){
    // trail
    bullet.trail.push({x:bullet.x,y:bullet.y});
    if(bullet.trail.length>12)bullet.trail.shift();
    bullet.trail.forEach((p,i)=>{
      const a=(i/bullet.trail.length)*0.5;
      const r=(i/bullet.trail.length)*BULLET_R*0.8;
      ctx2.beginPath();ctx2.arc(p.x,p.y,r,0,Math.PI*2);
      ctx2.fillStyle=`rgba(255,210,50,${a})`;ctx2.fill();
    });

    bullet.x+=bullet.vx;bullet.y+=bullet.vy;

    // Glowing bullet
    const bg=ctx2.createRadialGradient(bullet.x,bullet.y,1,bullet.x,bullet.y,BULLET_R);
    bg.addColorStop(0,'#fff');bg.addColorStop(0.35,'#FFD700');bg.addColorStop(1,'rgba(255,215,0,0)');
    ctx2.beginPath();ctx2.arc(bullet.x,bullet.y,BULLET_R,0,Math.PI*2);
    ctx2.fillStyle=bg;ctx2.fill();

    // Collision
    let hit=false;
    balls.forEach(b=>{
      if(b.popped||hit)return;
      const dx=bullet.x-b.x,dy=bullet.y-b.y;
      if(Math.sqrt(dx*dx+dy*dy)<BULLET_R+b.r){
        hit=true;
        b.popped=true;
        const correct=b.label===currentQ.correct;
        spawnSplat(b.x,b.y,b.color,correct);
        if(correct){
          gScore+=10;gMsgText='✨ YES! +10';gMsgGood=true;
          setTimeout(()=>{currentQ=makeQuestion();spawnBalls();},700);
          if(gScore>0&&gScore%50===0)confetti();
        } else {
          gLives--;gMsgText='💔 Wrong! -1 life';gMsgGood=false;
          if(gLives<=0){gActive=false;setTimeout(gameOver,500);}
        }
        gMsgTimer=80;
      }
    });
    if(hit||bullet.y<-20||bullet.x<-20||bullet.x>canvas.width+20)bullet=null;
  }

  // Draw shooter cannon
  const sx=shooter.x,sy=shooter.y;
  ctx2.save();
  // Glow base
  ctx2.beginPath();ctx2.arc(sx,sy,26,0,Math.PI*2);
  ctx2.fillStyle='rgba(192,132,252,0.2)';ctx2.fill();
  // Body
  ctx2.beginPath();ctx2.arc(sx,sy,20,0,Math.PI*2);
  const sg=ctx2.createRadialGradient(sx-5,sy-5,2,sx,sy,20);
  sg.addColorStop(0,'#E0AAFF');sg.addColorStop(1,'#7C3AED');
  ctx2.fillStyle=sg;ctx2.fill();
  ctx2.strokeStyle='rgba(255,255,255,0.5)';ctx2.lineWidth=2;ctx2.stroke();
  // Barrel
  ctx2.translate(sx,sy);ctx2.rotate(aimAngle);
  ctx2.fillStyle='#E0AAFF';
  ctx2.beginPath();ctx2.roundRect(14,-6,26,12,4);ctx2.fill();
  ctx2.strokeStyle='rgba(255,255,255,0.4)';ctx2.lineWidth=1;ctx2.stroke();
  ctx2.restore();

  // Message overlay
  if(gMsgTimer>0){
    gMsgTimer--;
    ctx2.save();
    ctx2.globalAlpha=Math.min(1,gMsgTimer/15);
    const fontSize=Math.max(18,28*(gMsgTimer/80));
    ctx2.font=`bold ${fontSize}px Nunito,sans-serif`;
    ctx2.textAlign='center';ctx2.textBaseline='middle';
    ctx2.fillStyle=gMsgGood?'#00F5A0':'#FF6B6B';
    ctx2.shadowColor=gMsgGood?'rgba(0,245,160,0.6)':'rgba(255,107,107,0.6)';
    ctx2.shadowBlur=20;
    ctx2.fillText(gMsgText,canvas.width/2,canvas.height*0.42);
    ctx2.restore();
  }
}

function gameOver(){
  cancelAnimationFrame(gAnimId);
  const pct=Math.round(gScore/100*100);
  let emoji,msg;
  if(gScore>=100){emoji='🏆';msg='Absolutely crushed it! Legend status! 🏆';}
  else if(gScore>=60){emoji='🔥';msg='So close! Play again and beat it!';}
  else if(gScore>=30){emoji='💎';msg='Not bad! Study the cheat sheet and blast again!';}
  else{emoji='💪';msg='Practice makes perfect! You got this!';}
  document.getElementById('goEmoji').textContent=emoji;
  document.getElementById('goTitle').textContent='Game Over!';
  document.getElementById('goMsg').textContent=msg;
  document.getElementById('goScore').textContent=gScore+' pts';
  document.getElementById('gameOverScreen').classList.add('show');
  canvas.classList.add('active');
}

// Touch: drag to aim, release to fire
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(!gActive)return;
  isDragging=true;
  const t=e.touches[0];
  const rect=canvas.getBoundingClientRect();
  const tx=(t.clientX-rect.left)*(canvas.width/rect.width);
  targetAngle=getAimAngle(tx);
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!gActive||!isDragging)return;
  const t=e.touches[0];
  const rect=canvas.getBoundingClientRect();
  const tx=(t.clientX-rect.left)*(canvas.width/rect.width);
  targetAngle=getAimAngle(tx);
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!gActive||!isDragging)return;
  isDragging=false;
  fireBullet();
},{passive:false});

// Click to aim and fire on desktop
canvas.addEventListener('click',e=>{
  if(!gActive)return;
  const rect=canvas.getBoundingClientRect();
  const tx=(e.clientX-rect.left)*(canvas.width/rect.width);
  targetAngle=getAimAngle(tx);
  setTimeout(fireBullet,80);
});

window.addEventListener('resize',()=>{
  resizeCanvas();
  if(gActive)spawnBalls();
});

// ═══════════════════════════════
// TABS
// ═══════════════════════════════
function switchTab(id,btn){
  // Hide scrollArea sections vs game section
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  if(id==='game'){
    startGame();
  } else {
    // Hide game canvas
    canvas.classList.remove('active');
    document.getElementById('gameOverScreen').classList.remove('show');
    if(gAnimId){cancelAnimationFrame(gAnimId);gAnimId=null;gActive=false;}
    document.getElementById('sec-'+id).classList.add('active');
    document.getElementById('scrollArea').scrollTop=0;
  }
}

// ═══════════════════════════════
function confetti(){
  const cols=['#FF2D78','#C084FC','#00F5A0','#FFD700','#38BDF8','#FF6B6B'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    p.className='confetti-p';
    p.style.left=Math.random()*100+'vw';
    p.style.top='-20px';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.animationDelay=(Math.random()*0.8)+'s';
    p.style.borderRadius=Math.random()>0.5?'50%':'2px';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),2800);
  }
}
